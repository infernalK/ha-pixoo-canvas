render_page:
  name: Render page
  description: >-
    Composes a page (a list of components, or a page configured in the
    integration's options) onto the Pixoo 64 and pushes it to the screen.
  fields:
    device_id:
      name: Device
      description: The Pixoo Canvas device to render on.
      required: true
      selector:
        device:
          integration: pixoo_canvas
    page:
      name: Page name
      description: >-
        Name of a page configured in the integration's options, of any page_type
        (components, clock, channel, visualizer, sound_meter, pv, fuel). Provide
        this, or an inline page (page_type/components/id/etc.), not both.
      required: false
      selector:
        text:
    page_type:
      name: Page type
      description: >-
        Only used for an inline page (omit when using 'page'). One of components
        (the default), clock, channel, visualizer, sound_meter, pv, fuel.
        clock/channel/visualizer also need an 'id'; sound_meter takes no extra
        field; pv/fuel take their own fields (power/storage/discharge/time for
        pv; title/name1/price1/name2/price2/name3/price3/status for fuel) passed
        as extra service data alongside page_type. See the README for field details.
      required: false
      selector:
        select:
          options:
            - components
            - clock
            - channel
            - visualizer
            - sound_meter
            - pv
            - fuel
    components:
      name: Components
      description: >-
        Inline list of page components (text/image/rectangle/icon/progress_bar/scroll_text/
        templatable). Text components accept an optional `font` (pico_8, the default bitmap
        font; gicko, wider; matrix_chunky_6/matrix_chunky_8, with real lowercase and French
        accents). scroll_text is a native, device-animated scrolling overlay (Draw/SendHttpText)
        rather than static buffer text.
        Used for an inline page_type: components page (the default page_type); provide this
        or 'page', not both.
      required: false
      selector:
        object:
    variables:
      name: Variables
      description: Extra variables made available to the page's Jinja templates.
      required: false
      selector:
        object:

play_buzzer:
  name: Play the buzzer
  description: >-
    Plays the Pixoo's built-in buzzer. Use at your own risk - repeated/rapid
    use of the buzzer could stress the device's hardware over time.
  fields:
    device_id:
      name: Device
      description: The Pixoo Canvas device to buzz.
      required: true
      selector:
        device:
          integration: pixoo_canvas
    active_time_ms:
      name: Buzz time per cycle
      description: How long the buzzer is on for each cycle.
      required: false
      selector:
        number:
          min: 1
          max: 9999
          unit_of_measurement: ms
          mode: box
    off_time_ms:
      name: Idle time per cycle
      description: How long the buzzer is off for between cycles.
      required: false
      selector:
        number:
          min: 1
          max: 9999
          unit_of_measurement: ms
          mode: box
    total_time_ms:
      name: Total time
      description: Total duration the buzzer keeps cycling on/off.
      required: false
      selector:
        number:
          min: 1
          max: 60000
          unit_of_measurement: ms
          mode: box

reboot_device:
  name: Reboot the device
  description: >-
    Reboots the Pixoo (Device/SysReboot). The screen goes dark for a while and
    any active rotation resumes once the device comes back online. Use for
    recovery automations (e.g. after a device becomes unresponsive), not as a
    routine action.
  fields:
    device_id:
      name: Device
      description: The Pixoo Canvas device to reboot.
      required: true
      selector:
        device:
          integration: pixoo_canvas

start_timer:
  name: Start the countdown timer
  description: >-
    Starts the Pixoo's built-in countdown timer tool (Tools/SetTimer),
    switching the screen to it. It takes over the screen until stop_timer is
    called or another page/service switches the device away from it - handy
    to call from an iOS/Android Shortcut (Home Assistant's app exposes any
    service as a "Perform action" step) for a quick kitchen timer.
  fields:
    device_id:
      name: Device
      description: The Pixoo Canvas device to start the timer on.
      required: true
      selector:
        device:
          integration: pixoo_canvas
    minutes:
      name: Minutes
      description: Countdown minutes (0-59). At least one of minutes/seconds must be non-zero.
      required: false
      selector:
        number:
          min: 0
          max: 59
          mode: box
    seconds:
      name: Seconds
      description: Countdown seconds (0-59). At least one of minutes/seconds must be non-zero.
      required: false
      selector:
        number:
          min: 0
          max: 59
          mode: box

stop_timer:
  name: Stop the countdown timer
  description: Stops the Pixoo's built-in countdown timer tool, if running.
  fields:
    device_id:
      name: Device
      description: The Pixoo Canvas device to stop the timer on.
      required: true
      selector:
        device:
          integration: pixoo_canvas
